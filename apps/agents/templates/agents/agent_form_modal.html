{% for field in form %}
    {% if field.name != 'csrfmiddlewaretoken' %}
    <div class="form-group">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
            <div class="alert alert-danger mt-2">{{ field.errors }}</div>
        {% endif %}
    </div>
    {% endif %}
{% endfor %}
