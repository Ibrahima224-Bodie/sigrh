{% extends "base.html" %}

{% block title %}Suppression {{ entity_label }}{% endblock %}

{% block content %}
<div class="container-fluid mt-3">
  <div class="row">
    <div class="col-md-6 offset-md-3">
      <div class="card border-danger shadow">
        <div class="card-header bg-danger text-white">
          <h5 class="m-0">Confirmer la suppression</h5>
        </div>
        <div class="card-body">
          <p>Voulez-vous supprimer {{ entity_label }} suivant ?</p>
          <p><strong>{{ object }}</strong></p>
        </div>
        <div class="card-footer">
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Supprimer</button>
            <a href="{% url list_url_name %}" class="btn btn-secondary">Annuler</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
